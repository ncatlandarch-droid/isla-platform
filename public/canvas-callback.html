<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Login — ISLA</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #002244 0%, #004684 50%, #0066cc 100%);
      color: #fff;
    }
    .callback-msg {
      text-align: center;
      padding: 3rem;
    }
    .callback-msg h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .callback-msg p { opacity: 0.8; font-size: 0.95rem; }
    .spinner {
      width: 40px; height: 40px; margin: 1rem auto;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #FDB927;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="callback-msg">
    <div class="spinner"></div>
    <h2>Connecting to Canvas…</h2>
    <p>This window will close automatically.</p>
  </div>

  <script>
    /**
     * Canvas OAuth2 Callback Handler
     * ────────────────────────────────
     * Canvas redirects here after the user logs in.
     * We extract the authorization code from the URL and
     * send it back to the parent window via postMessage.
     */
    (function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      if (window.opener) {
        window.opener.postMessage({
          type: 'canvas-oauth-callback',
          code: code || null,
          error: error || null,
          error_description: errorDescription || null,
        }, window.location.origin);

        // Close popup after a brief delay
        setTimeout(() => window.close(), 500);
      } else {
        // Not in a popup — redirect to main app
        document.querySelector('.callback-msg h2').textContent = 'Redirecting…';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      }
    })();
  </script>
</body>
</html>
