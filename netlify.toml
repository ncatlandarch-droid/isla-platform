[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Canvas OAuth callback page must be served before the SPA catch-all
[[redirects]]
  from = "/canvas-callback"
  to = "/canvas-callback.html"
  status = 200

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
